<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <input type="text" id="number1" placeholder="enter first number">
        <input type="text" id="number2" placeholder="enter second number">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select> 

        <button type="button"
        onclick="performArithmeticOperation()">
            perform arithmetic operation
        </button>

        <div id="result"> </div>

    </form>

    <script>
        function performArithmeticOperation()
        {
            const number1=parseFloat(document.getElementById("number1").value);
            const number2=parseFloat(document.getElementById("number2").value);
            const operator=document.getElementById("operator").value;

        let result=0;

        switch(operator){
            case"+":
             result=number1+number2;
            break;

            case"-":
             result=number1-number2;
            break;

            case"*":
             result=number1*number2;
            break;

            case"/":
            if(number2==0){
                result="Divide by zero error";
            }else{
                result=number1/number2;
            }
            break;
        }
        const resultDiv=document.getElementById("result");
        resultDiv.innerHTML=result;

        }
        
    </script>

</body>
</html>
