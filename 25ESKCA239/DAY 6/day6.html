<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center mb-4">Student Records</h2>

    <input
        type="text"
        id="search"
        class="form-control mb-4"
        placeholder="Search Student">

    <div id="container" class="row g-4"></div>
</div>

<script>

const students = [
    {name:"Rahul", branch:"CSE", cgpa:8.4},
    {name:"Priya", branch:"IT", cgpa:9.1},
    {name:"Aman", branch:"ECE", cgpa:7.9},
    {name:"Sneha", branch:"CSE", cgpa:8.8},
    {name:"Rohit", branch:"ME", cgpa:7.5},
    {name:"Neha", branch:"Civil", cgpa:8.2}
];

function displayStudents(data){

    $("#container").html("");

    data.forEach(student=>{

        $("#container").append(`
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h4>${student.name}</h4>
                        <p><b>Branch:</b> ${student.branch}</p>
                        <p><b>CGPA:</b> ${student.cgpa}</p>
                    </div>
                </div>
            </div>
        `);

    });

}

displayStudents(students);

$("#search").on("keyup",function(){

    let value=$(this).val().toLowerCase();

    let filtered=students.filter(student=>
        student.name.toLowerCase().includes(value) ||
        student.branch.toLowerCase().includes(value)
    );

    displayStudents(filtered);

});

</script>

</body>
</html>
